services:
  test:
    build: .
    command: >
      sh -c "python -m pytest -q
      && python -m r_project.lint --root .
      && python -m r_project --root . --json
      && python -m r_project --root . --markdown
      && python -m r_project --root . --json --fail-on-blockers
      && python -m r_project --root . --check-readme-examples
      && python -m r_project --root . --generate-readme-examples
      && python -m r_project --root . --write-readme-examples --dry-run-readme-examples
      && python -m r_project --root . --check-readme-examples --readme-examples-path README.md
      && python -m r_project --root . --write-readme-examples --dry-run-readme-examples --readme-examples-path README.md
      && python -m r_project --root . --check-readme-examples --readme-examples-path docs/usage-examples.md
      && python -m r_project --root . --write-readme-examples --dry-run-readme-examples --readme-examples-path docs/usage-examples.md
      && python -m r_project --root . --check-readme-examples --readme-examples-path docs/dashboard-index.md
      && python -m r_project --root . --write-readme-examples --dry-run-readme-examples --readme-examples-path docs/automation-index.md --readme-examples-section 'Embedded readiness report example'
      && python -m r_project --root . --check-readme-schema-examples --readme-schema-path docs/dashboard-index.md
      && python -m r_project --root . --write-readme-schema-examples --dry-run-readme-schema-examples --readme-schema-path docs/automation-index.md --readme-schema-section 'Embedded memory-overlap schema example'
      && python -m r_project --root . --check-readme-examples --readme-examples-path docs/automation-index.md
      && python -m r_project --root . --check-readme-schema-examples --readme-schema-path docs/automation-index.md
      && python -m r_project --root . --write-readme-examples
      && python -m r_project --memory-threshold-demo
      && python -m r_project --memory-threshold-demo --json
      && python -m r_project --memory-threshold-demo --memory-overlap-max-count 2 --memory-overlap-max-bytes 6
      && python -m r_project --memory-threshold-demo --json --memory-overlap-max-count 2 --memory-overlap-max-bytes 6
      && python -m r_project --memory-threshold-demo --memory-overlap-group-by name_prefix --memory-overlap-prefix-depth 2
      && python -m r_project --memory-threshold-demo --json --memory-overlap-group-by name_prefix --memory-overlap-prefix-depth 2
      && python -m r_project --memory-overlap-totals-demo
      && python -m r_project --memory-overlap-totals-demo --json
      && python -m r_project --memory-overlap-totals-demo --memory-overlap-group-by name_prefix --memory-overlap-prefix-depth 2
      && python -m r_project --memory-overlap-totals-demo --json --memory-overlap-group-by name_prefix --memory-overlap-prefix-depth 2
      && python -m r_project --memory-overlap-totals-demo --memory-overlap-name-prefix left.
      && python -m r_project --memory-threshold-demo --json --memory-overlap-tag source:literal --memory-overlap-max-count 0
      && python -m r_project --memory-overlap-demo-schema
      && python -m r_project --root . --check-memory-overlap-demo-schema
      && python -m r_project --root . --check-readme-schema-examples
      && python -m r_project --root . --write-readme-schema-examples --dry-run-readme-schema-examples
      && python -m r_project --root . --check-readme-schema-examples --readme-schema-path README.md
      && python -m r_project --root . --check-readme-schema-examples --readme-schema-path docs/dashboard-schema.md
      && python -m r_project --root . --check-changelog-version
      && python -m r_project --root . --check-release-tag v0.1.0 --docker-verified --skip-git-clean-check
      && python -m r_project --root . --json --check-release-tag v0.1.0 --docker-verified --skip-git-clean-check
      && python -m r_project --root . --check-release-tag-fixture
      && python -m r_project --root . --write-release-tag-fixture --dry-run-release-tag-fixture
      && python -m r_project --root . --write-release-tag-fixture --dry-run-release-tag-fixture --release-tag-fixture-path tests/fixtures/release-tag-checklist.json
      && python -m r_project --root . --check-release-tag-fixture --release-tag-fixture-path docs/release/checklist.json
      && python -m r_project --root . --check-release-examples --release-examples-path docs/release-examples.md
      && python -m r_project --root . --check-release-examples --release-examples-path docs/automation-index.md --release-examples-section 'Embedded release checklist example'
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-path docs/automation-index.md --release-examples-section 'Embedded release checklist example'
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.2.0 --release-examples-path docs/automation-index.md --release-examples-section 'Embedded release checklist example'
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.3.0 --release-examples-path docs/automation-index.md --release-examples-section 'Embedded release checklist example'
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-path tests/fixtures/automation-index-release-smoke.md --release-examples-section 'Embedded release checklist example'
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-path docs/release-examples.md
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.2.0 --release-examples-path docs/release-examples.md
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.3.0 --release-examples-path docs/release-examples.md
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.2.0 --release-examples-path tests/fixtures/release-examples-future-version-smoke.md
      && python -m r_project --root . --write-release-examples --dry-run-release-examples --release-examples-version 0.3.0 --release-examples-path tests/fixtures/release-examples-future-version-smoke.md
      && python -m r_project --root . --check-release-example-fixtures
      && python -m r_project --root . --check-release-example-sections
      && python -m r_project --root . --check-release-section-writer-matrix
      && python -m r_project --root . --check-release-section-writer-matrix --release-section-writer-matrix-version 0.2.0
      && python -m r_project --root . --check-release-section-writer-matrix --release-section-writer-matrix-version 0.3.0
      && python -m r_project --root . --generate-release-section-writer-matrix --release-section-writer-matrix-version 0.2.0
      && python -m r_project --root . --generate-release-section-writer-matrix --release-section-writer-matrix-version 0.3.0
      && python -m r_project --root . --write-release-section-writer-matrix --dry-run-release-section-writer-matrix --release-section-writer-matrix-version 0.2.0
      && python -m r_project --root . --write-release-section-writer-matrix --dry-run-release-section-writer-matrix --release-section-writer-matrix-version 0.3.0
      && python -m r_project --root . --check-release-examples-path-safety
      && python -m r_project --root . --generate-release-automation-index
      && python -m r_project --root . --generate-release-automation-index --release-automation-index-version 0.3.0
      && python -m r_project --root . --write-release-automation-index --dry-run-release-automation-index
      && python -m r_project --root . --write-release-automation-index --dry-run-release-automation-index --release-automation-index-version 0.3.0
      && python -m r_project --root . --check-release-automation-index
      && python -m r_project --root . --check-release-automation-index --release-automation-index-version 0.3.0
      && python -m r_project --root . --check-automation-index-links
      && python -m r_project --root . --check-automation-index-commands
      && python -m r_project --root . --check-automation-command-fixtures
      && python -m r_project --root . --generate-dashboard-automation-index
      && python -m r_project --root . --write-dashboard-automation-index --dry-run-dashboard-automation-index
      && python -m r_project --root . --check-dashboard-automation-index
      && python -m r_project --root . --generate-dashboard-example-fixtures
      && python -m r_project --root . --write-dashboard-example-fixtures --dry-run-dashboard-example-fixtures
      && python -m r_project --root . --check-dashboard-example-fixtures
      && python -m r_project --root . --write-readme-schema-examples --dry-run-readme-schema-examples --readme-schema-path docs/dashboard-schema.md
      && python -m r_project --root . --write-readme-examples --dry-run-readme-examples --readme-examples-path docs/dashboard-index.md
      && python -m r_project --root . --write-readme-schema-examples --dry-run-readme-schema-examples --readme-schema-path docs/dashboard-index.md
      && python -m r_project --root . --check-dashboard-section-writer-matrix
      && python -m r_project --root . --check-dashboard-section-writer-matrix --dashboard-section-writer-matrix-variant compact
      && python -m r_project --root . --generate-dashboard-section-writer-matrix --dashboard-section-writer-matrix-variant compact
      && python -m r_project --root . --write-dashboard-section-writer-matrix --dry-run-dashboard-section-writer-matrix --dashboard-section-writer-matrix-variant compact
      && python -m r_project --root . --write-release-tag-fixture --dry-run-release-tag-fixture --release-tag-fixture-version 0.2.0"
